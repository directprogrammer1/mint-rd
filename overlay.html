<script>
function getPrjId() {
    if (!["scratch.mit.edu", "turbowarp.org", "mirror.turbowarp.xyz"].includes(window.location.hostname)) {
        log("Invalid host, returning default project ID", "error")
        return "489159823";
    }
    let prjId = "489159823"
    if (window.location.hostname === "scratch.mit.edu") {
        prjId = parseInt(window.location.pathname.split("/")[2].replace(/\D/g, "").trim(),);
    } else {
        prjId = window.location.pathname.split("/")[1].replace(/\D/g, "").trim();
    }

    return prjId
} // temp
    
let chatWS = null;

let onChatOpen = null;
let onChatMessage = null;
let onChatClose = null;
let onChatError = null;

function connectWS() {
    const prjId = getPrjId();
    if (!prjId) return null;

    chatWS = new WebSocket(`wss://mint-cloud.alwaysdata.net/backend/websockets/chat/${prjId}`);

    chatWS.addEventListener("open", (event) => {
        if (typeof onChatOpen === "function") {
            onChatOpen(event, chatWS);
        }
    });

    chatWS.addEventListener("message", (event) => {
        let data = null;

        try {
            data = JSON.parse(event.data);
        } catch (e) {
            console.error("Invalid WS JSON", e);
        }

        if (typeof onChatMessage === "function") {
            onChatMessage(data, event, chatWS);
        }
    });

    chatWS.addEventListener("close", (event) => {
        if (typeof onChatClose === "function") {
            onChatClose(event, chatWS);
        }
    });

    chatWS.addEventListener("error", (event) => {
        if (typeof onChatError === "function") {
            onChatError(event, chatWS);
        }
    });

    return chatWS;
}
