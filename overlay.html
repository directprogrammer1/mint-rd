<link rel="stylesheet" href="https://directprogrammer1.github.io/mint-rd/assets/css/style.css">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Manrope">
<!-- fallback links -->
<div class="overlay" name="show-toggle">
    <div class="glass tab maximized">
        <div class="glass header">
            <button name="minimax" class="glass">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="arrow"><path stroke="none" d="M0 0h24v24H0z" fill="none"/><path d="M9 6l6 6l-6 6" /></svg>
            </button>
            <h4>Player</h4>
        </div>
        <div class="glass body">
            <label class="glass option">
                Invincibility
                <input type="checkbox" id="invincibility">
            </label>
            <label class="glass option">
                Flight
                <input type="checkbox" id="flight">
            </label>
            <label class="glass option">
                Noclip
                <input type="checkbox" id="noclip">
            </label>
            <label class="glass option">
                Infinite Ammo
                <input type="checkbox" id="infammo">
            </label>
            <label class="glass option">
                Instant Reload
                <input type="checkbox" id="instareload">
            </label>
            <label class="glass option">
                Landmines
                <input type="checkbox" id="landmines">
            </label>
            <label class="glass option">
                Movement Speed
                <input placeholder="1" class="glass" type="number" id="movespeed">
            </label>
            <label class="glass option">
                Jump Height
                <input placeholder="1" class="glass" type="number" id="jumpheight">
            </label>
        </div>
    </div>
    <div class="glass tab maximized">
        <div class="glass header">
            <button name="minimax" class="glass">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="arrow"><path stroke="none" d="M0 0h24v24H0z" fill="none"/><path d="M9 6l6 6l-6 6" /></svg>
            </button>
            <h4>Game</h4>
        </div>
        <div class="glass body">
            <label class="glass option">
                Gravity
                <input placeholder="1" class="glass" type="number" id="gravity">
            </label>
        </div>
    </div>
    <div class="glass tab maximized">
        <div class="glass header">
            <button name="minimax" class="glass">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="arrow"><path stroke="none" d="M0 0h24v24H0z" fill="none"/><path d="M9 6l6 6l-6 6" /></svg>
            </button>
            <h4>Visual</h4>
        </div>
        <div class="glass body">
            <label class="glass option">
                Username
                <input placeholder="[currentusername]" class="glass" type="text" id="username">
            </label>
        </div>
    </div>
</div>
<div class="msg-wrapper">
    <div class="glass message" id="warning">
        <h3>Please enter fullscreen to show the overlay.</h3>
    </div>
</div>
<div class="menubar-wrapper" name="show-toggle">
    <div class="glass menubar">
        <img src="/assets/mint-logo.ico">
        <div class="menubar-options">
            <button id="terminal" class="menubar-btn">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path stroke="none" d="M0 0h24v24H0z" fill="none" /><path d="M8 9l3 3l-3 3" /><path d="M13 15l3 0" /><path d="M3 6a2 2 0 0 1 2 -2h14a2 2 0 0 1 2 2v12a2 2 0 0 1 -2 2h-14a2 2 0 0 1 -2 -2l0 -12" /></svg>
                Terminal
            </button>
            <button id="chat" class="menubar-btn">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path stroke="none" d="M0 0h24v24H0z" fill="none" /><path d="M8 9h8" /><path d="M8 13h6" /><path d="M18 4a3 3 0 0 1 3 3v8a3 3 0 0 1 -3 3h-5l-5 3v-3h-2a3 3 0 0 1 -3 -3v-8a3 3 0 0 1 3 -3h12" /></svg>
                Chat
            </button>
            <button id="hacks" class="menubar-btn">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path stroke="none" d="M0 0h24v24H0z" fill="none" /><path d="M4 20h16" /><path d="M4 12h16" /><path d="M4 4h16" /></svg>
                Hacks
            </button>
        </div>
    </div>
</div>
